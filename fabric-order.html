<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>零售布料訂購 | 直盈國際有限公司</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-stone-50 text-stone-800 antialiased">
    <main class="min-h-screen max-w-4xl mx-auto px-6 py-12 md:py-20">
      <a
        href="index.html"
        class="inline-flex items-center text-sm font-medium text-blue-900 hover:underline"
      >
        ← 回首頁
      </a>

      <section class="mt-8 bg-white rounded-2xl shadow-lg p-8 md:p-12">
        <p class="text-xs tracking-[0.2em] uppercase text-amber-700">
          Fabric Order
        </p>
        <h1 class="text-3xl md:text-5xl font-bold text-blue-950 mt-3">
          零售布料訂購
        </h1>
        <p class="mt-6 text-lg leading-relaxed text-stone-700">
          提供 Giovanni Mario、Holland and Sherry
          及多品牌面料零售訂購，協助您依用途、季節與預算挑選最合適的布料。
        </p>

        <div class="mt-10 grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <div class="rounded-xl border border-stone-200 p-6">
            <h2 class="text-xl font-semibold text-blue-950">可訂購品項</h2>
            <p class="mt-3 text-stone-600">西裝面料與特殊織紋系列。</p>
          </div>
          <div class="rounded-xl border border-stone-200 p-6">
            <h2 class="text-xl font-semibold text-blue-950">西裝訂製服務</h2>
            <p class="mt-3 text-stone-600">
              也提供西裝訂製服務，包含版型建議、面料搭配與整體穿搭諮詢。
            </p>
          </div>
          <div class="rounded-xl border border-stone-200 p-6">
            <h2 class="text-xl font-semibold text-blue-950">聯絡方式</h2>
            <p class="mt-3 text-stone-600">電話：(02) 2556-6180</p>
            <p class="text-stone-600">
              營業時間：週一至週六 10:00-18:00（預約制）
            </p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
